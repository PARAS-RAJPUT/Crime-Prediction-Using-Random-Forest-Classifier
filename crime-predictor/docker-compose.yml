version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: crime_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - crime_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── ML Service (Flask + scikit-learn) ────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: crime_ml
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ml_models:/app/models
      - ./dataset:/app/dataset:ro
    networks:
      - crime_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Node.js Backend (Express + Mongoose) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crime_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongo:27017/crimedb
      - JWT_SECRET=crime_predictor_secret_2024
      - ML_SERVICE_URL=http://ml-service:5000
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - crime_net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── React Frontend (Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:5001
    container_name: crime_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crime_net

volumes:
  mongo_data:
    driver: local
  ml_models:
    driver: local

networks:
  crime_net:
    driver: bridge
